name: NyayaSetu CI/CD

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "api/**"
      - "preprocessing/**"
      - "Dockerfile"
      - "requirements.txt"
      - "frontend/**"
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest httpx fastapi uvicorn python-dotenv groq tenacity

      - name: Run tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SKIP_MODEL_LOAD: "true"
        run: |
          pytest tests/ -v --tb=short || true

      - name: Deploy to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python - <<'EOF'
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path=".",
              repo_id="CaffeinatedCoding/nyayasetu",
              repo_type="space",
              ignore_patterns=[".git*", ".dvc*", "data/", "models/", "*.pyc", "__pycache__", ".env", "logs/"]
          )
          print("Deployed successfully")
          EOF